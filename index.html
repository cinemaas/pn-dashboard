function unlock(pw){
  try{ var dec=CryptoJS.AES.decrypt(CIPHER,pw).toString(CryptoJS.enc.Utf8);
    if(dec.slice(0,11)==="PN_UNLOCKED"){ sessionStorage.setItem("pn_ok",pw);
      document.open(); document.write(dec.slice(11)); document.close(); return true; } }catch(e){}
  return false;
}
document.getElementById("f").addEventListener("submit",function(e){
  e.preventDefault();
  if(!unlock(document.getElementById("pw").value.trim()))

});
(function(){var p=sessionStorage.getItem("pn_ok"); if(p) unlock(p);})();
